name: Task
description: Concrete implementation task
title: "[TASK] "
labels: ["task"]
body:
  - type: textarea
    attributes:
      label: Description
      description: What needs to be built or changed
    validations:
      required: true

  - type: textarea
    attributes:
      label: Acceptance Criteria
      description: Clear conditions for done
    validations:
      required: true

  - type: input
    attributes:
      label: Estimate (hours)
      placeholder: "e.g. 6–8"

